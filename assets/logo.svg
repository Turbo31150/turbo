<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#12121F"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF3366"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="520" height="160" rx="14" fill="url(#bg)"/>
  <rect width="520" height="160" rx="14" fill="none" stroke="#FF6B35" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Turbine icon -->
  <g transform="translate(26, 20)" filter="url(#glow)">
    <!-- Outer -->
    <circle cx="60" cy="60" r="54" fill="none" stroke="#FF6B35" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 4"/>
    <!-- Middle -->
    <circle cx="60" cy="60" r="40" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Core -->
    <circle cx="60" cy="60" r="22" fill="#0A0A14" stroke="url(#g1)" stroke-width="2"/>
    <!-- T letter -->
    <text x="60" y="68" text-anchor="middle" fill="url(#g1)" font-size="20" font-weight="800" letter-spacing="-1" filter="url(#glow)">T</text>
    <!-- Turbine blades -->
    <g stroke="url(#g2)" stroke-width="2.5" stroke-opacity="0.8">
      <line x1="60" y1="6"  x2="60" y2="38"/>
      <line x1="60" y1="82" x2="60" y2="114"/>
      <line x1="6"  y1="60" x2="38" y2="60"/>
      <line x1="82" y1="60" x2="114" y2="60"/>
    </g>
    <!-- Diagonal blades -->
    <g stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.6">
      <line x1="21" y1="21" x2="42" y2="42"/>
      <line x1="99" y1="21" x2="78" y2="42"/>
      <line x1="21" y1="99" x2="42" y2="78"/>
      <line x1="99" y1="99" x2="78" y2="78"/>
    </g>
    <!-- Nodes -->
    <circle cx="60" cy="6"   r="4" fill="#FF6B35" filter="url(#glow)"/>
    <circle cx="60" cy="114" r="4" fill="#FFD700" filter="url(#glow)"/>
    <circle cx="6"  cy="60"  r="4" fill="#FF3366" filter="url(#glow)"/>
    <circle cx="114" cy="60" r="4" fill="#FF6B35" filter="url(#glow)"/>
    <circle cx="21" cy="21"  r="3" fill="#FFD700" fill-opacity="0.8"/>
    <circle cx="99" cy="21"  r="3" fill="#FFD700" fill-opacity="0.8"/>
    <circle cx="21" cy="99"  r="3" fill="#FF3366" fill-opacity="0.8"/>
    <circle cx="99" cy="99"  r="3" fill="#FF3366" fill-opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="168" y="58" fill="url(#g1)" font-size="34" font-weight="800" letter-spacing="-1" filter="url(#glow)">JARVIS·TURBO</text>
  <!-- Subtitle -->
  <text x="169" y="83" fill="#8B8B9E" font-size="13" letter-spacing="0.5">Windows Multi-Agent Orchestrator</text>
  <!-- Divider -->
  <rect x="168" y="93" width="330" height="1.5" rx="1" fill="url(#g1)" opacity="0.4"/>

  <!-- Tags -->
  <g transform="translate(168, 107)">
    <rect x="0"   y="0" width="66"  height="22" rx="5" fill="#FF6B35" fill-opacity="0.1" stroke="#FF6B35" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="33"  y="15" text-anchor="middle" fill="#FF6B35" font-size="10">Python</text>
    <rect x="72"  y="0" width="62"  height="22" rx="5" fill="#FFD700" fill-opacity="0.1" stroke="#FFD700" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="103" y="15" text-anchor="middle" fill="#FFD700" font-size="10">React 19</text>
    <rect x="140" y="0" width="56"  height="22" rx="5" fill="#FF3366" fill-opacity="0.1" stroke="#FF3366" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="168" y="15" text-anchor="middle" fill="#FF3366" font-size="10">Electron</text>
    <rect x="202" y="0" width="48"  height="22" rx="5" fill="#FF6B35" fill-opacity="0.1" stroke="#FF6B35" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="226" y="15" text-anchor="middle" fill="#FF6B35" font-size="10">CUDA</text>
  </g>

  <!-- Bottom -->
  <text x="168" y="149" fill="#484F58" font-size="10">Turbo31150  ·  MIT  ·  10 GPUs  ·  78GB VRAM  ·  3 machines  ·  96 agent patterns</text>
</svg>
