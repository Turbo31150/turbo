version: '3.8'

# ═══════════════════════════════════════════════════════════════
# JARVIS Docker Compose — Full stack deployment
# Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ── Main WebSocket Server ──────────────────────────────────
  jarvis-ws:
    build:
      context: ../..
      dockerfile: projects/linux/Dockerfile
    container_name: jarvis-ws
    ports:
      - "9742:9742"
    volumes:
      - ../../data:/app/data
      - ../../.env:/app/.env:ro
    environment:
      - TURBO=/app
      - PYTHONUNBUFFERED=1
    command: python -m python_ws.server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9742/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Direct Proxy ───────────────────────────────────────────
  jarvis-proxy:
    build:
      context: ../..
      dockerfile: projects/linux/Dockerfile.node
    container_name: jarvis-proxy
    ports:
      - "18800:18800"
    volumes:
      - ../../canvas:/app/canvas:ro
      - ../../.env:/app/.env:ro
    environment:
      - TURBO=/app
    command: node canvas/direct-proxy.js
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      jarvis-ws:
        condition: service_healthy

  # ── Pipeline Engine Daemon ─────────────────────────────────
  jarvis-pipeline:
    build:
      context: ../..
      dockerfile: projects/linux/Dockerfile
    container_name: jarvis-pipeline
    volumes:
      - ../../data:/app/data
      - ../../.env:/app/.env:ro
    environment:
      - TURBO=/app
      - PYTHONUNBUFFERED=1
    command: python scripts/pipeline_engine.py --daemon
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9742/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      jarvis-ws:
        condition: service_healthy

  # ── Ollama (local LLM) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── OpenClaw Server ──────────────────────────────────────
  jarvis-openclaw:
    build:
      context: ../..
      dockerfile: projects/linux/Dockerfile
    container_name: jarvis-openclaw
    ports:
      - "18789:18789"
    volumes:
      - ../../:/app
    environment:
      - JARVIS_HOME=/app
    command: python -m src.openclaw_server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      jarvis-ws:
        condition: service_healthy

volumes:
  ollama_data:
